<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a0f1a"/>
      <stop offset="1" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cc0029"/>
      <stop offset="1" stop-color="#ff4d6b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.1" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#ff4d6b" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ff4d6b" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <text x="90" y="270" font-family="DejaVu Sans" font-size="18" font-weight="700" fill="#ff8aa0" letter-spacing="2">ЛОКАЛЬНЫЙ WHISPER</text>
<text x="90" y="320" font-family="DejaVu Sans" font-size="44" font-weight="700" fill="#f8fafc">Локальный Whisper —</text>
<text x="90" y="370" font-family="DejaVu Sans" font-size="44" font-weight="700" fill="#f8fafc">полностью офлайн.</text>
<text x="90" y="470" font-family="DejaVu Sans" font-size="20" font-weight="500" fill="#cbd5e1">Нет субтитров? Распознавайте аудио</text>
<text x="90" y="499" font-family="DejaVu Sans" font-size="20" font-weight="500" fill="#cbd5e1">Whisper'ом локально. Ничего не уходит из</text>
<text x="90" y="528" font-family="DejaVu Sans" font-size="20" font-weight="500" fill="#cbd5e1">браузера.</text>
  
  <g transform="translate(830 100)" filter="url(#shadow)">
